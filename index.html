
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KSS - Kanha Security System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at 50% 0%, #1a103d 0%, #030014 50%);
        background-attachment: fixed;
        color: #ffffff;
        min-height: 100vh;
      }
      .gradient-text {
        background: linear-gradient(90deg, #00f2fe 0%, #7000ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .glass-card {
        background: rgba(16, 12, 42, 0.4);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .perspective-1000 {
        perspective: 1000px;
      }
      .hero-gradient {
        background: radial-gradient(circle at center, rgba(112, 0, 255, 0.15) 0%, transparent 70%);
      }
      
      @keyframes marquee-rtl {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      @keyframes marquee-ltr {
        0% { transform: translateX(-50%); }
        100% { transform: translateX(0); }
      }
      
      .animate-marquee-rtl {
        display: flex;
        width: max-content;
        animation: marquee-rtl 40s linear infinite;
      }
      .animate-marquee-ltr {
        display: flex;
        width: max-content;
        animation: marquee-ltr 40s linear infinite;
      }
      .animate-marquee-rtl:hover, .animate-marquee-ltr:hover {
        animation-play-state: paused;
      }
      
      .slide-enter {
        opacity: 0;
        transform: translateY(20px);
      }
      .slide-active {
        opacity: 1;
        transform: translateY(0);
        transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      .progress-bar {
        height: 2px;
        background: #00f2fe;
        transition: width 0.1s linear;
      }

      /* Flip Card Specific Styles */
      .transform-style-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }
      .rotate-y-180 {
        transform: rotateY(180deg);
      }
    </style>

  }
}
</script>
</head>

  </body>
</html>
